# This file configures CodeCov. New PRs can increase or decrease coverage--only
# the total coverage threshold matters.
coverage:
  status:
    project:
      default:
        target: 75%
    patch: off # we can enable this if we figure out a reasonable policy
  ignore:
    - "launch_viewer.py"
    - "setup.py"
    - "viewer/app.py"
    - "viewer/metadata.py"
    - "viewer/ui.py"

